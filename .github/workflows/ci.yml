name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bootstrap status
        if: ${{ hashFiles('package-lock.json') == '' }}
        run: |
          echo "package-lock.json is not committed yet."
          echo "Skipping Node quality gates during repository bootstrap."
          echo "Run npm install locally, commit package-lock.json, then CI will enforce lint/typecheck/tests."
      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci
      - name: Lint
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run lint
      - name: Typecheck
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm run typecheck
      - name: Test
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm test -- --run --passWithNoTests
