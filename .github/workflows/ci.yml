name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bootstrap guard
        run: |
          if [ ! -f package-lock.json ]; then
            echo "package-lock.json is not committed yet."
            echo "Skipping Node quality gates during repository bootstrap."
            echo "Run npm install locally, commit package-lock.json, then CI will enforce lint/typecheck/tests."
            exit 0
          fi
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run --passWithNoTests
